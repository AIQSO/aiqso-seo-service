version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "eslint-config-next"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"

  - package-ecosystem: "npm"
    directory: "/services/serpbear"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
    groups:
      babel-ecosystem:
        patterns:
          - "@babel/*"
      testing:
        patterns:
          - "jest*"
          - "@testing-library/*"
          - "@types/jest"

  - package-ecosystem: "npm"
    directory: "/services/serpbear/mcp_server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
